<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KoreaTech 4년 수강 플래너</title>
<style>
:root {
  --bg: #ffffff;
  --bg2: #f7f7f5;
  --bg3: #f0ede6;
  --text: #1a1a18;
  --text2: #5a5a56;
  --text3: #9a9a94;
  --border: rgba(0,0,0,0.12);
  --border2: rgba(0,0,0,0.20);
  --border3: rgba(0,0,0,0.35);
  --radius: 8px;
  --radius-lg: 12px;
  --font: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  --blue: #1d4ed8;
  --green: #059669;
  --red: #dc2626;
  --amber: #d97706;
  --teal: #0891b2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg3); color: var(--text); font-size: 14px; min-height: 100vh; }
.app { display: flex; flex-direction: column; min-height: 100vh; background: var(--bg3); }

/* TOP BAR */
.topbar {
  display: flex; align-items: center; gap: 10px; padding: 10px 16px;
  border-bottom: 1px solid var(--border); background: var(--bg);
  position: sticky; top: 0; z-index: 100; flex-wrap: wrap;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.logo { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; display: flex; align-items: center; gap: 6px; }
.logo-dot { color: var(--blue); }
.top-right { display: flex; gap: 10px; margin-left: auto; align-items: center; flex-wrap: wrap; }
.sel-grp { display: flex; flex-direction: column; gap: 2px; }
.sel-grp label { font-size: 10px; color: var(--text3); font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }
.deg-tabs { display: flex; gap: 4px; }
.deg-tab {
  font-size: 11px; padding: 5px 11px; border-radius: 6px; cursor: pointer; font-family: var(--font);
  border: 1px solid var(--border2); background: transparent; color: var(--text2);
  transition: all .15s; font-weight: 500;
}
.deg-tab:hover { background: var(--bg2); }
.deg-tab.on { background: var(--blue); border-color: var(--blue); color: #fff; }
.major-sel {
  font-size: 12px; padding: 5px 10px; border: 1px solid var(--border2); border-radius: 6px;
  background: var(--bg); color: var(--text); cursor: pointer; font-family: var(--font); min-width: 160px;
}

/* LAYOUT */
.body-wrap { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: 240px; min-width: 240px; background: var(--bg); border-right: 1px solid var(--border);
  overflow-y: auto; padding: 12px 10px; display: flex; flex-direction: column; gap: 8px;
  max-height: calc(100vh - 50px); position: sticky; top: 50px;
}
.mains { flex: 1; overflow-y: auto; padding: 14px; max-height: calc(100vh - 50px); }

/* SIDEBAR COMPONENTS */
.total-block {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 12px 14px;
}
.total-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 8px; }
.total-num { font-size: 30px; font-weight: 700; }
.total-of { font-size: 12px; color: var(--text3); }
.total-pct { font-size: 11px; color: var(--text2); margin-left: auto; }
.prog-bar { height: 5px; background: #e5e7eb; border-radius: 3px; overflow: hidden; margin-top: 2px; }
.prog-fill { height: 100%; border-radius: 3px; transition: width .4s; }

.sb-card {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden;
}
.sb-card-head {
  padding: 7px 11px; font-size: 11px; font-weight: 600; color: var(--text2);
  background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; letter-spacing: .02em;
}
.sb-card-head .badge {
  font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 10px;
  background: #eff6ff; color: var(--blue);
}
.sb-card-head .badge.ok { background: #ecfdf5; color: var(--green); }
.sb-card-head .badge.warn { background: #fef2f2; color: var(--red); }
.sb-body { padding: 8px 10px; display: flex; flex-direction: column; gap: 3px; }

.grp-label {
  font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: .04em;
  text-transform: uppercase; margin: 5px 0 2px; padding-bottom: 3px;
  border-bottom: 1px solid var(--border);
}
.grp-label:first-child { margin-top: 0; }

.req-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
.req-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.req-lbl { font-size: 11px; color: var(--text2); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.req-sub { font-size: 9px; color: var(--text3); display: block; margin-top: 1px; white-space: normal; }
.req-val { font-size: 10px; font-weight: 600; white-space: nowrap; }
.req-val.ok { color: var(--green); }
.req-val.warn { color: var(--red); }
.req-val.part { color: var(--amber); }
.req-mini-bar { height: 3px; background: #e5e7eb; border-radius: 2px; margin-bottom: 1px; overflow: hidden; }
.req-mini-fill { height: 100%; border-radius: 2px; }

.chk-item { display: flex; align-items: flex-start; gap: 6px; padding: 3px 0; }
.chk-icon { font-size: 12px; flex-shrink: 0; width: 16px; text-align: center; margin-top: 1px; }
.chk-name { font-size: 10px; color: var(--text2); flex: 1; line-height: 1.4; }
.chk-cr { font-size: 10px; color: var(--text3); white-space: nowrap; }
.chk-item.done .chk-name { color: var(--green); }
.chk-item.done .chk-icon { color: var(--green); }

.warn-list { padding: 6px 10px; display: flex; flex-direction: column; gap: 5px; }
.warn-line {
  font-size: 10px; color: #7c2d12; background: #fff7ed; border-left: 2px solid var(--amber);
  padding: 5px 8px; border-radius: 0 4px 4px 0; line-height: 1.4;
}
.ok-line {
  font-size: 11px; color: var(--green); text-align: center; padding: 8px;
  background: #ecfdf5; border-radius: 6px; margin: 4px 0;
}

/* SEMESTER GRID */
.sem-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.sem-card {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden;
  transition: box-shadow .2s;
}
.sem-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.sem-card.ipp { border-color: var(--teal); }
.sem-card.over { border-color: var(--amber); }
.sem-card.ipp.over { border-color: var(--teal); }
.sem-hdr {
  display: flex; align-items: center; gap: 6px; padding: 8px 11px;
  border-bottom: 1px solid var(--border); background: var(--bg2);
}
.sem-yr { font-size: 12px; font-weight: 600; color: var(--text); }
.sem-cr { font-size: 10px; color: var(--text2); margin-left: auto; }
.sem-cr.over { color: var(--amber); font-weight: 600; }
.ipp-pill { font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 10px; background: var(--teal); color: #fff; }
.ipp-btn {
  font-size: 9px; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-family: var(--font);
  border: 1px solid var(--border2); background: transparent; color: var(--text2);
  transition: all .15s;
}
.ipp-btn:hover:not(:disabled) { background: var(--bg3); }
.ipp-btn.on { background: var(--teal); border-color: var(--teal); color: #fff; }
.ipp-btn:disabled { opacity: .35; cursor: not-allowed; }

.sem-body { padding: 8px 9px; min-height: 64px; display: flex; flex-direction: column; gap: 3px; }
.ipp-banner {
  padding: 12px 10px; text-align: center; background: rgba(8,145,178,.07);
  border-radius: 7px; color: var(--teal); font-size: 11px; line-height: 1.6; margin-bottom: 3px;
}
.chip {
  display: flex; align-items: center; gap: 5px; padding: 4px 8px;
  border-radius: 6px; background: var(--bg2); border: 1px solid var(--border);
  transition: border-color .15s;
}
.chip:hover { border-color: var(--border2); }
.chip.gd-warn { border-color: #fbbf24; background: #fffbeb; }
.chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.chip-name { font-size: 11px; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chip-cr { font-size: 10px; color: var(--text2); flex-shrink: 0; }
.chip-del {
  font-size: 14px; line-height: 1; cursor: pointer; color: var(--text3);
  background: none; border: none; padding: 0 2px; flex-shrink: 0;
}
.chip-del:hover { color: var(--red); }
.add-btn {
  display: flex; align-items: center; gap: 5px; padding: 5px 8px;
  font-size: 11px; color: var(--text3); cursor: pointer; border-radius: 6px;
  border: 1px dashed var(--border2); background: transparent; width: 100%; margin-top: 3px;
  transition: all .15s; font-family: var(--font);
}
.add-btn:hover { background: var(--bg2); color: var(--text2); border-color: var(--blue); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);
  display: flex; align-items: center; justify-content: center; z-index: 999;
  backdrop-filter: blur(2px);
}
.modal {
  width: 92%; max-width: 540px; max-height: 88vh;
  background: var(--bg); border-radius: var(--radius-lg); border: 1px solid var(--border2);
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
.modal-hdr {
  padding: 13px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
}
.modal-title { font-size: 14px; font-weight: 600; color: var(--text); }
.modal-close {
  margin-left: auto; font-size: 20px; cursor: pointer; color: var(--text3);
  background: none; border: none; line-height: 1; transition: color .15s;
}
.modal-close:hover { color: var(--text); }
.modal-search { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
.modal-search input {
  flex: 1; padding: 7px 11px; font-size: 12px; border: 1px solid var(--border2);
  border-radius: 7px; background: var(--bg2); color: var(--text); font-family: var(--font);
  outline: none; transition: border-color .15s;
}
.modal-search input:focus { border-color: var(--blue); }
.modal-ipp-btn {
  font-size: 10px; padding: 5px 9px; border-radius: 6px; cursor: pointer; font-family: var(--font);
  border: 1px solid var(--teal); background: transparent; color: var(--teal); white-space: nowrap;
  transition: all .15s;
}
.modal-ipp-btn:hover { background: var(--teal); color: #fff; }
.modal-filters {
  display: flex; gap: 5px; padding: 8px 14px; overflow-x: auto; border-bottom: 1px solid var(--border);
  scrollbar-width: none;
}
.modal-filters::-webkit-scrollbar { display: none; }
.fpill {
  font-size: 10px; padding: 4px 10px; border-radius: 20px; cursor: pointer; flex-shrink: 0;
  border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: var(--font);
  white-space: nowrap; transition: all .15s;
}
.fpill:hover { background: var(--bg2); }
.fpill.on { background: var(--blue); border-color: var(--blue); color: #fff; }
.modal-list { overflow-y: auto; flex: 1; }
.modal-item { display: flex; align-items: center; gap: 9px; padding: 8px 14px; cursor: pointer; transition: background .12s; }
.modal-item:hover { background: var(--bg2); }
.mi-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.mi-info { flex: 1; min-width: 0; }
.mi-name { font-size: 12px; color: var(--text); }
.mi-sub { font-size: 10px; color: var(--text3); margin-top: 1px; }
.mi-cr { font-size: 12px; font-weight: 600; color: var(--text); flex-shrink: 0; }
.mi-req { font-size: 9px; padding: 1px 5px; border-radius: 3px; background: #fee2e2; color: #991b1b; margin-left: 4px; }
.mi-gd { font-size: 9px; padding: 1px 5px; border-radius: 3px; background: #fef3c7; color: #92400e; margin-left: 4px; }
.mi-added { font-size: 9px; color: var(--green); margin-left: 4px; }
.modal-empty { padding: 24px; text-align: center; color: var(--text3); font-size: 12px; }
.modal-section-hdr { padding: 8px 14px; font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: .04em; background: var(--bg2); border-bottom: 1px solid var(--border); }

@media (max-width: 720px) {
  .sem-grid { grid-template-columns: 1fr; }
  .sidebar { width: 100%; min-width: 0; max-height: none; position: relative; top: 0; }
  .body-wrap { flex-direction: column; }
}
@media print {
  .topbar { position: relative; }
  .sidebar { max-height: none; position: relative; top: 0; }
  .mains { max-height: none; }
  .add-btn, .chip-del, .ipp-btn { display: none; }
}
</style>
</head>

function codeMap(){ const m={}; COURSES.forEach(c=>m[c.c]=c); return m; }
const CMAP = codeMap();
function addedCodes(){ return new Set(ST.sems.flat().map(c=>c.c)); }
function calcByCAT(){
  const m={};
  ST.sems.flat().forEach(c=>{
    m[c.cat]=(m[c.cat]||0)+c.cr;
    if(c.sub) m['msc_'+c.sub]=(m['msc_'+c.sub]||0)+c.cr;
  });
  return m;
}
function totalCr(){ return ST.sems.flat().reduce((s,c)=>s+c.cr,0); }
function semCr(i){ return ST.sems[i].reduce((s,c)=>s+c.cr,0); }
function isGD(c){ return c.gd===true; }
function isIPP(c){ return c.ipp===true; }

function getWarnings(){
  const ws=[];
  ST.ippSems.forEach(i=>{ if(i<4) ws.push(`${Math.floor(i/2)+1}학년 ${i%2+1}학기 IPP 설정 → IPP는 4학기 이수 후(3~4학년)부터 지원 가능합니다.`); });
  ST.sems.forEach((sem,si)=>{
    if(si<4) sem.forEach(c=>{ if(isGD(c)) ws.push(`${Math.floor(si/2)+1}학년 ${si%2+1}학기 '${c.n}' → 졸업설계는 3~4학년 배치를 권장합니다.`); });
    const cr=semCr(si);
    if(!ST.ippSems.has(si) && cr>21) ws.push(`${Math.floor(si/2)+1}학년 ${si%2+1}학기: ${cr}학점 → 학기 최대 이수학점(21학점) 초과`);
  });
  return ws;
}

function pctBar(got,req,color){
  const p=req>0?Math.min(100,Math.round(got/req*100)):100;
  return `<div class="req-mini-bar"><div class="req-mini-fill" style="width:${p}%;background:${got>=req?'#059669':color}"></div></div>`;
}
function reqRow(label,got,req,color,note=''){
  const ok=got>=req, part=got>0&&!ok;
  const cls=ok?'ok':part?'part':'warn';
  return `${pctBar(got,req,color)}
<div class="req-row">
  <div class="req-dot" style="background:${ok?'#059669':color}"></div>
  <span class="req-lbl">${label}${note?`<span class="req-sub">${note}</span>`:''}</span>
  <span class="req-val ${cls}">${got}/${req}</span>
</div>`;
}
function subRow(label,got,req,color,indent=true){
  const ok=got>=req, part=got>0&&!ok;
  const cls=ok?'ok':part?'part':'warn';
  return `<div class="req-row" style="${indent?'padding-left:10px':''}">
  <div class="req-dot" style="width:5px;height:5px;background:${ok?'#059669':color}"></div>
  <span class="req-lbl" style="font-size:10px">${label}</span>
  <span class="req-val ${cls}" style="font-size:10px">${got}/${req}</span>
</div>`;
}

          const done=added.has(h.c);
          return `<div class="chk-item ${done?'done':''}">
            <span class="chk-icon">${done?'✓':'○'}</span>
            <span class="chk-name">${h.n}</span>
            <span class="chk-cr">${h.cr}학점</span>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="sb-card">
      <div class="sb-card-head">🔬 전공 ${majBadge()}</div>
      <div class="sb-body">
        ${subRow('전공기초',mfG,12,'#7c3aed',false)}
        ${subRow('학부공통필수',drG,0,'#6366f1',false)}
        ${subRow('전공필수',mrG,30,'#9333ea',false)}
        ${subRow('전공선택',meG,28,'#a855f7',false)}
        ${subRow('학부공통선택',deG,0,'#818cf8',false)}
      </div>
    </div>

    <div class="sb-card">
      <div class="sb-card-head">🆓 자유선택</div>
      <div class="sb-body">${subRow('자유선택',freeG,dc.자유,'#9ca3af',false)}</div>
    </div>

    ${ST.major!=='전공 미선택'?`
    <div class="sb-card">
      <div class="sb-card-head">📋 ${ST.major} 필수과목
        <span class="badge ${reqMissing===0?'ok':'warn'}">${reqMissing===0?'완료':reqMissing+'개 미이수'}</span>
      </div>
      <div class="sb-body">
        ${mj.note?`<div style="font-size:10px;color:#6b7280;padding:3px 0 5px;border-bottom:1px solid #e5e7eb;margin-bottom:4px;line-height:1.4">${mj.note}</div>`:''}
        <div class="grp-label">핵심 필수</div>
        ${(mj.req||[]).map(code=>{
          const course=CMAP[code];
          const done=added.has(code);
          return `<div class="chk-item ${done?'done':''}">
            <span class="chk-icon">${done?'✓':'○'}</span>
            <span class="chk-name">${course?course.n:code}</span>
            <span class="chk-cr">${course?course.cr+'학점':''}</span>
          </div>`;
        }).join('')}
        ${(mj.gd||[]).length>0?`
        <div class="grp-label" style="color:#b45309">졸업설계 (3~4학년 이수)</div>
        ${(mj.gd||[]).map(code=>{
          const course=CMAP[code];
          const done=added.has(code);
          return `<div class="chk-item ${done?'done':''}">
            <span class="chk-icon" style="color:${done?'#059669':'#b45309'}">${done?'✓':'△'}</span>
            <span class="chk-name" style="color:${done?'#059669':'#b45309'}">${course?course.n:code}</span>
            <span class="chk-cr">${course?course.cr+'학점':''}</span>
          </div>`;
        }).join('')}`:''}
      </div>
    </div>`:''}

    <div class="sb-card">
      <div class="sb-card-head" style="${ws.length>0?'color:#dc2626':''}">
        ${ws.length>0?`⚠ 주의 (${ws.length}건)`:'✓ 이상 없음'}
      </div>
      ${ws.length>0
        ?`<div class="warn-list">${ws.map(w=>`<div class="warn-line">${w}</div>`).join('')}</div>`
        :`<div class="sb-body"><div class="ok-line">모든 요건이 정상입니다</div></div>`}
    </div>
  `;

  // ---- SEMESTER GRID ----
  document.getElementById('semGrid').innerHTML = ST.sems.map((sem,si)=>{
    const yr=Math.floor(si/2)+1, sn=si%2+1;
    const isIPPSem=ST.ippSems.has(si);
    const canIPP=si>=4;
    const cr=semCr(si);
    const crOver=cr>21&&!isIPPSem;

    const ippCrs=sem.filter(c=>isIPP(c));
    const normalCrs=sem.filter(c=>!isIPP(c));

    let coursesHTML='';
    if(isIPPSem){
      const ippCr=ippCrs.reduce((s,c)=>s+c.cr,0);
      coursesHTML=`<div class="ipp-banner">
        🏭 <strong>IPP 장기현장실습 학기</strong><br>
        <small>4개월(6학점) · 6개월(9학점) · 성적: S/U 처리</small>
        ${ippCr>0?`<br><strong>${ippCr}학점 등록됨</strong>`:'<br><small style="color:#0e7490">아래 버튼으로 IPP 과목 추가</small>'}
      </div>`;
      coursesHTML+=ippCrs.map(c=>`<div class="chip">
        <div class="chip-dot" style="background:#0891b2"></div>
        <span class="chip-name">${c.n}</span>
        <span class="chip-cr">${c.cr}학점</span>
        <button class="chip-del" onclick="delC(${si},'${c._id}')">×</button>
      </div>`).join('');
    } else {
      coursesHTML=normalCrs.map(c=>{
        const gdWarn=isGD(c)&&si<4;
        return `<div class="chip ${gdWarn?'gd-warn':''}">
          <div class="chip-dot" style="background:${CC[c.cat]||'#9ca3af'}"></div>
          <span class="chip-name" title="${c.n}${gdWarn?' ⚠졸업설계 시기 주의':''}">${c.n}</span>
          <span class="chip-cr">${c.cr}학점</span>
          <button class="chip-del" onclick="delC(${si},'${c._id}')">×</button>
        </div>`;
      }).join('');
    }
    coursesHTML+=`<button class="add-btn" onclick="openModal(${si})">＋ 과목 추가</button>`;

    return `<div class="sem-card ${isIPPSem?'ipp':''} ${crOver?'over':''}">
      <div class="sem-hdr">
        <span class="sem-yr">${yr}학년 ${sn}학기</span>
        ${isIPPSem?'<span class="ipp-pill">IPP</span>':''}
        <span class="sem-cr ${crOver?'over':''}">${cr}학점${crOver?' ⚠':''}</span>
        ${canIPP
          ?`<button class="ipp-btn ${isIPPSem?'on':''}" onclick="toggleIPP(${si})">${isIPPSem?'IPP 해제':'IPP 설정'}</button>`
          :`<button class="ipp-btn" disabled title="3학년부터 가능">IPP</button>`}
      </div>
      <div class="sem-body">${coursesHTML}</div>
    </div>`;
  }).join('');

  // ---- MODAL ----
  if(ST.modal!==null){
    const si=ST.modal;
    const yr=Math.floor(si/2)+1, sn=si%2+1;
    const isIPPSem=ST.ippSems.has(si);
    const mj2=MAJORS[ST.major]||MAJORS['전공 미선택'];
    const reqSet=new Set(mj2.req||[]);
    const gdSet=new Set(mj2.gd||[]);
    const addedSet=addedCodes();

    const filterCats=isIPPSem
      ?[{k:'all',l:'전체'},{k:'mr',l:'IPP 과목'}]
      :[
        {k:'all',l:'전체'},{k:'kor',l:'국어'},{k:'eng',l:'영어'},{k:'msc',l:'수리적사고'},
        {k:'insung',l:'인성소양'},{k:'arts',l:'예술문학'},{k:'social',l:'사회심리'},
        {k:'history',l:'역사철학'},{k:'nature',l:'자연인간'},{k:'gen_free',l:'교양선택'},
        {k:'hrd_r',l:'HRD필수'},{k:'hrd_e',l:'HRD선택'},
        {k:'mf',l:'전공기초'},{k:'mr',l:'전공필수'},{k:'me',l:'전공선택'},
        {k:'dr',l:'학부공통필수'},{k:'de',l:'학부공통선택'},{k:'free',l:'자유선택'},
      ];

    const q2=ST.q.toLowerCase();
    let filtered=COURSES.filter(c=>{
      if(isIPPSem && !isIPP(c)) return false;
      if(ST.filt!=='all' && c.cat!==ST.filt) return false;
      if(q2 && !c.n.toLowerCase().includes(q2) && !c.c.toLowerCase().includes(q2)) return false;
      return true;
    }).slice(0,80);

    // Sort: required first, then gd, then rest
    filtered.sort((a,b)=>{
      const aR=reqSet.has(a.c)?0:gdSet.has(a.c)?1:2;
      const bR=reqSet.has(b.c)?0:gdSet.has(b.c)?1:2;
      return aR-bR;
    });

    const filterBtns=filterCats.map(f=>`<button class="fpill ${ST.filt===f.k?'on':''}" onclick="setFilt('${f.k}')">${f.l}</button>`).join('');
    const items=filtered.length?filtered.map(c=>{
      const isR=reqSet.has(c.c), isGd=gdSet.has(c.c), alr=addedSet.has(c.c);
      return `<div class="modal-item" onclick="addC(${si},'${c.c}')">
        <div class="mi-dot" style="background:${CC[c.cat]||'#9ca3af'}"></div>
        <div class="mi-info">
          <div class="mi-name">
            ${c.n}
            ${alr?'<span class="mi-added">✓ 추가됨</span>':''}
            ${isR?'<span class="mi-req">필수</span>':''}
            ${isGd?'<span class="mi-gd">졸업설계</span>':''}
          </div>
          <div class="mi-sub">${CL[c.cat]||c.cat} · ${c.c}</div>
        </div>
        <span class="mi-cr">${c.cr}학점</span>
      </div>`;
    }).join(''):`<div class="modal-empty">검색 결과가 없습니다<br><small>다른 필터나 검색어를 사용해보세요</small></div>`;

    document.getElementById('modalWrap').innerHTML=`
      <div class="modal-overlay" onclick="closeOuter(event)">
        <div class="modal">
          <div class="modal-hdr">
            <span class="modal-title">${yr}학년 ${sn}학기 — 과목 추가${isIPPSem?' (IPP 현장실습 등록)':''}</span>
            <button class="modal-close" onclick="closeModal()">×</button>
          </div>
          <div class="modal-search">
            <input type="text" id="msrch" placeholder="과목명 또는 코드로 검색..." value="${ST.q}" oninput="setQ(this.value)">
            ${si>=4?`<button class="modal-ipp-btn" onclick="setFilt('mr');setQ('IPP')">IPP 과목</button>`:''}
          </div>
          <div class="modal-filters">${filterBtns}</div>
          <div class="modal-list">${items}</div>
        </div>
      </div>`;
    setTimeout(()=>{const el=document.getElementById('msrch');if(el){el.focus();const v=el.value;el.value='';el.value=v;}},0);
  } else {
    document.getElementById('modalWrap').innerHTML='';
  }

  // ---- DEGREE TABS ----
  document.getElementById('degTabs').innerHTML=['공학사','경영학사','고용학사'].map(d=>
    `<button class="deg-tab ${ST.degree===d?'on':''}" onclick="setDegree('${d}')">${d}</button>`
  ).join('');
}

function renderMajorSelect(){
  const sel=document.getElementById('majorSel');
  sel.innerHTML=Object.keys(MAJORS).map(m=>`<option value="${m}" ${ST.major===m?'selected':''}>${m}</option>`).join('');
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function setDegree(d){
  ST.degree=d;
  // auto-match degree if major has preferred degree
  const mj=MAJORS[ST.major];
  if(mj&&mj.degree&&mj.degree!==d){/* keep user's selection */}
  render();
}
function setMajor(m){
  ST.major=m;
  const mj=MAJORS[m];
  if(mj&&mj.degree) ST.degree=mj.degree;
  renderMajorSelect();
  render();
}
function toggleIPP(si){
  if(si<4){ alert('⚠ IPP 장기현장실습 안내\n\nIPP는 4학기(2학년 2학기) 이수 후 신청 가능합니다.\n3~4학년 학기(5~8학기)에만 설정할 수 있습니다.'); return; }
  if(ST.ippSems.has(si)) ST.ippSems.delete(si);
  else ST.ippSems.add(si);
  render();
}
function openModal(si){ ST.modal=si; ST.q=''; ST.filt='all'; render(); }
function closeModal(){ ST.modal=null; render(); }
function closeOuter(e){ if(e.target.classList.contains('modal-overlay')) closeModal(); }
function setQ(v){ ST.q=v; render(); }
function setFilt(f){ ST.filt=f; render(); }
function addC(si,code){
  const course=COURSES.find(c=>c.c===code);
  if(!course) return;
  const nc={...course, _id:`${code}_${++uid}`};
  ST.sems[si]=[...ST.sems[si],nc];
  ST.modal=null;
  render();
}
function delC(si,id){
  ST.sems[si]=ST.sems[si].filter(c=>c._id!==id);
  render();
}

// Keyboard shortcut: Escape to close modal
document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&ST.modal!==null) closeModal(); });

// Init
renderMajorSelect();
render();
</script>
</body>
</html>
